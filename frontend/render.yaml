services:
  - type: static
    name: docentrack-frontend
    runtime: node
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://docentrack.onrender.com/api/
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
