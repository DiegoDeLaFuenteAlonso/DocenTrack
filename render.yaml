services:
  # Backend API
  - type: web
    name: docentrack-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn docentrack.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: docentrack-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://docentrack-web.onrender.com"

staticSites:
  - name: docentrack
    runtime: node
    plan: free
    region: frankfurt
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: "https://docentrack.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: docentrack-db
    plan: free
    region: frankfurt